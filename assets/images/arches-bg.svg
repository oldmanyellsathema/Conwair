<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" fill="none" opacity="0.045">
  <g stroke="#6b5d4f" stroke-linecap="round" stroke-linejoin="round">
    <!-- Large arch, left side, sketchy double-stroke -->
    <path d="M120,520 L122,280 C124,195 165,138 210,108 C258,76 320,62 370,62 C422,64 480,78 525,110 C568,140 605,192 608,278 L610,520" stroke-width="1.8" />
    <path d="M119,518 L121,282 C122,198 162,141 208,112 C254,80 318,65 368,66 C420,67 478,82 522,113 C564,143 602,196 606,280 L607,518" stroke-width="0.7" stroke-dasharray="8,4,2,4" />

    <!-- Inner arch echo -->
    <path d="M158,520 L160,298 C161,228 194,178 230,152 C268,125 318,112 365,113 C414,114 462,128 496,155 C530,182 560,230 562,300 L563,520" stroke-width="1.1" />

    <!-- Keystone mark -->
    <line x1="362" y1="52" x2="368" y2="82" stroke-width="0.9" />
    <line x1="355" y1="66" x2="375" y2="66" stroke-width="0.9" />

    <!-- Spring line, hand-drawn (slightly wobbly) -->
    <path d="M118,278 C200,276 300,280 370,277 C440,274 540,279 612,278" stroke-width="0.6" stroke-dasharray="6,5,2,5" />

    <!-- Dimension tick marks -->
    <line x1="120" y1="525" x2="120" y2="540" stroke-width="0.8" />
    <line x1="610" y1="525" x2="610" y2="540" stroke-width="0.8" />
    <path d="M125,534 C250,532 490,536 605,534" stroke-width="0.5" stroke-dasharray="3,4" />

    <!-- Small pointed arch, right side -->
    <path d="M750,580 L752,390 C754,340 780,295 830,268 C860,252 885,262 900,280 C916,262 942,252 970,268 C1020,295 1048,340 1050,390 L1052,580" stroke-width="1.5" />
    <path d="M782,580 L783,405 C784,360 806,320 842,298 C866,284 886,290 900,304 C914,290 934,284 958,298 C994,320 1016,360 1018,405 L1019,580" stroke-width="0.8" />

    <!-- Voussoir lines on small arch -->
    <line x1="770" y1="350" x2="810" y2="325" stroke-width="0.5" />
    <line x1="800" y1="310" x2="835" y2="290" stroke-width="0.5" />
    <line x1="968" y1="290" x2="1002" y2="310" stroke-width="0.5" />
    <line x1="992" y1="325" x2="1032" y2="350" stroke-width="0.5" />

    <!-- Rough stone coursing lines on left arch -->
    <path d="M160,480 C260,478 460,482 562,480" stroke-width="0.4" stroke-dasharray="12,8" />
    <path d="M155,430 C270,428 450,432 565,430" stroke-width="0.4" stroke-dasharray="10,9" />
    <path d="M162,380 C260,378 460,382 558,380" stroke-width="0.4" stroke-dasharray="14,7" />
    <path d="M175,335 C280,333 440,337 548,335" stroke-width="0.4" stroke-dasharray="8,10" />

    <!-- Column detail, bottom left -->
    <rect x="110" y="500" width="55" height="28" rx="1" stroke-width="0.9" />
    <rect x="600" y="500" width="55" height="28" rx="1" stroke-width="0.9" />

    <!-- Scattered construction notes feel -->
    <!-- Small circle with crosshair, like a survey mark -->
    <circle cx="900" cy="160" r="18" stroke-width="0.7" stroke-dasharray="4,3" />
    <line x1="882" y1="160" x2="918" y2="160" stroke-width="0.5" />
    <line x1="900" y1="142" x2="900" y2="178" stroke-width="0.5" />

    <!-- Rough rectangle, like a plan view block -->
    <path d="M1100,200 L1280,202 L1278,380 L1098,378 Z" stroke-width="0.8" stroke-dasharray="6,5" />
    <path d="M1100,290 L1280,291" stroke-width="0.4" stroke-dasharray="3,6" />
    <path d="M1190,200 L1189,380" stroke-width="0.4" stroke-dasharray="4,5" />

    <!-- Small segmental arch, bottom right -->
    <path d="M1050,780 L1052,680 C1054,645 1090,620 1150,618 C1210,620 1248,645 1250,680 L1252,780" stroke-width="1.2" />
    <path d="M1050,780 L1252,780" stroke-width="0.8" />

    <!-- Faint grid lines, like graph paper -->
    <line x1="50" y1="800" x2="400" y2="800" stroke-width="0.2" opacity="0.5" />
    <line x1="50" y1="850" x2="400" y2="850" stroke-width="0.2" opacity="0.5" />
    <line x1="50" y1="900" x2="400" y2="900" stroke-width="0.2" opacity="0.5" />
    <line x1="100" y1="760" x2="100" y2="950" stroke-width="0.2" opacity="0.5" />
    <line x1="200" y1="760" x2="200" y2="950" stroke-width="0.2" opacity="0.5" />
    <line x1="300" y1="760" x2="300" y2="950" stroke-width="0.2" opacity="0.5" />

    <!-- Pencil scribble, an angle mark -->
    <path d="M220,830 L280,830 L280,870" stroke-width="0.6" />
    <path d="M268,830 C268,842 268,850 280,850" stroke-width="0.4" />

    <!-- A tiny rough triangle, like a pediment sketch -->
    <path d="M500,750 L570,690 L640,752" stroke-width="0.9" />
    <path d="M502,752 L638,752" stroke-width="0.6" />
    <line x1="570" y1="690" x2="570" y2="752" stroke-width="0.4" stroke-dasharray="3,4" />
  </g>
</svg>
