title: Conwair
tagline: "The Mason"
description: "Reviews, field notes, and honest software for project managers who'd rather be on site than behind a screen."
url: "https://conwair.com"
baseurl: ""

permalink: /blog/:title/

collections_dir: .
markdown: kramdown
highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "The Mason"
