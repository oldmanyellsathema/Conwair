---
layout: default
---

<article>
  <div class="post-header">
    <div class="post-header-meta">
      {% if page.tags.first %}
      <span class="post-tag">{{ page.tags.first }}</span>
      <span class="post-dot"></span>
      {% endif %}
      <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
    </div>
    <h1>{{ page.title }}</h1>
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</article>
